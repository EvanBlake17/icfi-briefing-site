<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Daily Briefing</title>
<script>(function(){
  var t=localStorage.getItem('theme');
  if(t){document.documentElement.setAttribute('data-theme',t);}
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.documentElement.setAttribute('data-theme','dark');
  }
})();</script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="page-wrapper">

  <nav class="top-nav">
    <div class="nav-links">
      <a href="index.html">Latest</a>
      <a href="archive.html">Archive</a>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="show-light">◐ Dark</span>
      <span class="show-dark">◑ Light</span>
    </button>
  </nav>

  <header class="masthead">
    <div class="masthead-rules-top"></div>
    <h1 class="masthead-title">Daily Briefing</h1>
    <p class="masthead-date">Search</p>
    <div class="masthead-rule-bottom"></div>
  </header>

  <main class="content">
    <div class="search-box">
      <input type="text" id="search-input" class="search-input"
             placeholder="Search across all briefings..." autofocus>
    </div>
    <p id="search-meta" class="search-meta"></p>
    <ul id="search-results" class="search-results"></ul>
  </main>

  <footer class="site-footer">
    <a href="index.html">← Latest</a>
  </footer>

</div>
<script src="assets/theme.js"></script>
<script src="assets/search.js"></script>
</body>
</html>
