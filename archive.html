<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — Daily Briefing</title>
<script>(function(){
  var t=localStorage.getItem('theme');
  if(t){document.documentElement.setAttribute('data-theme',t);}
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){
    document.documentElement.setAttribute('data-theme','dark');
  }
})();</script>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="page-wrapper">

  <nav class="top-nav">
    <div class="nav-links">
      <a href="index.html">Latest</a>
    </div>
    <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <span class="show-light">◐ Dark</span>
      <span class="show-dark">◑ Light</span>
    </button>
  </nav>

  <header class="masthead">
    <div class="masthead-rules-top"></div>
    <h1 class="masthead-title">Daily Briefing</h1>
    <p class="masthead-date">Archive</p>
    <div class="masthead-rule-bottom"></div>
  </header>

  <main class="content">
    <ul class="archive-list">
      <li><a href="briefings/2026-02-25.html"><span class="entry-title">February 25, 2026</span></a></li>
      <li><a href="briefings/2026-02-24.html"><span class="entry-title">February 24, 2026</span></a></li>
    </ul>
  </main>

  <footer class="site-footer">
    <a href="index.html">← Latest</a>
  </footer>

</div>
<script src="assets/theme.js"></script>
</body>
</html>
